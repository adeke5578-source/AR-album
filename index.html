<!DOCTYPE html>
<html>
  <head>
    <title>AR Альбом</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.7.7/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin:0;overflow:hidden;">
    <a-scene embedded arjs="trackingMethod: best; sourceType: webcam;">
      <a-marker preset="hiro">
        <a-video src="#video1" width="1" height="0.6" autoplay="true" loop="false" position="0 0 0"></a-video>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
    <video id="video1" src="video1.mp4" crossorigin="anonymous" webkit-playsinline playsinline></video>
  </body>
</html>
